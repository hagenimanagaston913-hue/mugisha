<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <h1>API Test Page</h1>
    <p>Use this page to test if your API endpoints are working correctly.</p>

    <div class="test-section">
        <h3>1. Test Login</h3>
        <input type="email" id="test-email" placeholder="Email" value="admin@school.com" style="padding: 8px; width: 200px;">
        <input type="password" id="test-password" placeholder="Password" value="password123" style="padding: 8px; width: 200px;">
        <button onclick="testLogin()">Test Login</button>
        <div id="login-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>2. Test Get Students</h3>
        <button onclick="testGetStudents()">Get Students List</button>
        <div id="students-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>3. Test Get Classes</h3>
        <button onclick="testGetClasses()">Get Classes</button>
        <div id="classes-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>4. Test Get Subjects</h3>
        <button onclick="testGetSubjects()">Get Subjects</button>
        <div id="subjects-result" class="result"></div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        function showResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.textContent = JSON.stringify(data, null, 2);
            element.className = 'result ' + (isError ? 'error' : 'success');
        }

        async function testLogin() {
            const email = document.getElementById('test-email').value;
            const password = document.getElementById('test-password').value;
            
            try {
                const result = await API.login(email, password);
                showResult('login-result', {
                    success: true,
                    message: 'Login successful!',
                    user: result.user,
                    token: result.token.substring(0, 20) + '...'
                });
            } catch (error) {
                showResult('login-result', {
                    error: error.message
                }, true);
            }
        }

        async function testGetStudents() {
            try {
                if (!getAuthToken()) {
                    showResult('students-result', {
                        error: 'Please login first'
                    }, true);
                    return;
                }
                const result = await API.getStudents();
                showResult('students-result', result);
            } catch (error) {
                showResult('students-result', {
                    error: error.message
                }, true);
            }
        }

        async function testGetClasses() {
            try {
                if (!getAuthToken()) {
                    showResult('classes-result', {
                        error: 'Please login first'
                    }, true);
                    return;
                }
                const result = await API.getClasses();
                showResult('classes-result', result);
            } catch (error) {
                showResult('classes-result', {
                    error: error.message
                }, true);
            }
        }

        async function testGetSubjects() {
            try {
                if (!getAuthToken()) {
                    showResult('subjects-result', {
                        error: 'Please login first'
                    }, true);
                    return;
                }
                const result = await API.getSubjects();
                showResult('subjects-result', result);
            } catch (error) {
                showResult('subjects-result', {
                    error: error.message
                }, true);
            }
        }
    </script>
</body>
</html>
